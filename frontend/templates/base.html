<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecruitAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</head>

<body class="bg-gray-100">
    
    <!-- 🔝 HEADER -->
<header class="w-full bg-white shadow-md fixed top-0 left-0 z-50">
    <div class="w-full">
        <img src="{{ url_for('static', filename='header.png') }}" 
             class="w-full h-auto object-cover"
             alt="College Header">
    </div>
</header>
<div class="{% if session.get('user') %}flex{% endif %}">

    {% if session.get('user') %}
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white min-h-screen p-5">
        <h1 class="text-2xl font-bold mb-8">RecruitAI</h1>
        <nav class="space-y-4">
            <a href="/dashboard" class="block hover:text-blue-400">Dashboard</a>
            <a href="/job_roles" class="block hover:text-blue-400">Job Roles</a>
            <a href="/ai_screening" class="block hover:text-blue-400">AI Screening</a>
            <a href="/candidates" class="block hover:text-blue-400">Candidates</a>
            <a href="/ranking" class="block hover:text-blue-400">Ranking</a>
            <a href="/admin" class="block hover:text-blue-400">Admin</a>
            <a href="/logout" class="block text-red-400 mt-8">Logout</a>
        </nav>
    </aside>
    {% endif %}

    <!-- MAIN CONTENT (ONLY ONE BLOCK IN WHOLE FILE) -->
    <main class="{% if session.get('user') %}flex-1 p-10{% endif %}">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
