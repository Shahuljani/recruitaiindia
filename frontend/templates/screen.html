{% extends "base.html" %}
{% block content %}

<h2 class="text-3xl font-bold mb-6">AI Resume Screening</h2>

<form action="/process" method="POST" enctype="multipart/form-data">
    <input type="file" name="resumes" multiple accept=".pdf" class="mb-4">
    <button class="bg-blue-600 text-white px-6 py-2 rounded">Process</button>
</form>

{% endblock %}
